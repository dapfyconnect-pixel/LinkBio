<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAvdX5mNJI09c43ZR3QlyKrk6S22DeQ90",
        authDomain: "biolink-211d7.firebaseapp.com",
        projectId: "biolink-211d7",
        storageBucket: "biolink-211d7.firebasestorage.app",
        messagingSenderId: "607886026514",
        appId: "1:607886026514:web:2e803fe882e6d39105b5cb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('editor-screen').classList.remove('hidden');

            // CORREÇÃO DEFINITIVA DO LINK:
            // Pega a URL atual, remove o "admin.html" e coloca "index.html"
            let loc = window.location.href.split('?')[0]; // Remove query strings antigas
            let baseURL = loc.substring(0, loc.lastIndexOf('/'));
            const finalPublicLink = `${baseURL}/index.html?u=${user.uid}`;
            
            document.getElementById('display-link').innerText = finalPublicLink;
            
            document.getElementById('copy-btn').onclick = () => {
                navigator.clipboard.writeText(finalPublicLink);
                alert("Link da Bio copiado com sucesso!");
            };

            // Carregar dados existentes
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('in-name').value = d.name || "";
                document.getElementById('in-desc').value = d.desc || "";
                document.getElementById('in-img').value = d.img || "";
                document.getElementById('in-wa').value = d.whatsapp || "";
                document.getElementById('in-color').value = d.color || "#3b82f6";
                document.getElementById('links-area').innerHTML = ""; // Limpa antes de carregar
                (d.links || []).forEach(l => createLinkInput(l.label, l.url));
            }
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('editor-screen').classList.add('hidden');
        }
    });

    // Função para criar campos de link
    window.createLinkInput = (label = "", url = "") => {
        const div = document.createElement('div');
        div.className = 'link-row';
        div.innerHTML = `
            <input type="text" class="l-name" placeholder="Título (ex: Instagram)" value="${label}" style="margin-bottom:5px">
            <input type="text" class="l-url" placeholder="Link (https://...)" value="${url}" style="margin-bottom:0">
            <button onclick="this.parentElement.remove()" style="color:#ff4444; background:none; border:none; font-size:0.7rem; margin-top:5px; cursor:pointer; font-weight:bold;">[ REMOVER ]</button>
        `;
        document.getElementById('links-area').appendChild(div);
    }

    document.getElementById('add-link-btn').onclick = () => createLinkInput();

    document.getElementById('save-data').onclick = async () => {
        const user = auth.currentUser;
        if(!user) return;

        const links = Array.from(document.querySelectorAll('.link-row')).map(r => ({
            label: r.querySelector('.l-name').value,
            url: r.querySelector('.l-url').value
        }));

        await setDoc(doc(db, "users", user.uid), {
            name: document.getElementById('in-name').value,
            desc: document.getElementById('in-desc').value,
            img: document.getElementById('in-img').value,
            whatsapp: document.getElementById('in-wa').value,
            color: document.getElementById('in-color').value,
            links: links
        });
        alert("✅ Perfil Publicado com Sucesso!");
    };

    document.getElementById('btn-login').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Preencha todos os campos");
        try { 
            await signInWithEmailAndPassword(auth, email, pass); 
        } catch (error) {
            try { 
                await createUserWithEmailAndPassword(auth, email, pass); 
            } catch (err) { alert("Erro: " + err.message); }
        }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
