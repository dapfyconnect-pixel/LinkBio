<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bio | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030712; --card: #111827; --border: #1f2937; --primary: #3b82f6; --text: #f9fafb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
        input, select, textarea { width: 100%; background: #030712; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .copy-box { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--primary); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .link-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .link-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
        .badge { background: #1f2937; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-screen" class="box">
            <h2>Acesse sua Bio</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn btn-primary" id="btn-auth">Entrar / Cadastrar</button>
        </div>

        <div id="editor-screen" class="box hidden">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3>Dashboard</h3>
                <button id="btn-logout" style="color:#ff4444; background:none; border:none; cursor:pointer;">Sair</button>
            </div>

            <div class="copy-box">
                <p style="font-size:0.7rem; color:#94a3b8;">LINK PARA SUA BIO:</p>
                <code id="final-link" style="color:#60a5fa; font-size:0.8rem; word-break:break-all; display:block; margin-top:5px;"></code>
            </div>

            <label>Foto do Perfil (URL)</label>
            <input type="text" id="p-img" placeholder="https://...">
            <label>Nome</label>
            <input type="text" id="p-name">
            <label>Bio</label>
            <textarea id="p-desc" rows="2"></textarea>
            <label>Cor do Brilho</label>
            <input type="color" id="p-color" value="#3b82f6" style="height:45px;">

            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
                <span>Links</span>
                <button class="btn" id="add-link" style="width:auto; padding:5px 15px; background:#1f2937; color:white;">+ Novo</button>
            </div>
            <div id="links-container"></div>
            <button class="btn btn-primary" id="save-btn" style="margin-top:20px;">Publicar Alterações</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAvdX5mNJI09c43ZR3QlyKrk6S22DeQ90",
            authDomain: "biolink-211d7.firebaseapp.com",
            projectId: "biolink-211d7",
            storageBucket: "biolink-211d7.firebasestorage.app",
            messagingSenderId: "607886026514",
            appId: "1:607886026514:web:2e803fe882e6d39105b5cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('editor-screen').classList.remove('hidden');
                document.getElementById('final-link').innerText = `https://dapfyconnect-pixel.github.io/BioPro/?u=${user.uid}`;
                loadData(user.uid);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('editor-screen').classList.add('hidden');
            }
        });

        window.addLinkField = (label = "", url = "", icon = "fas fa-link", clicks = 0) => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <div class="link-row">
                    <select class="l-icon" style="width:70px; margin:0">
                        <option value="fab fa-instagram" ${icon.includes('instagram')?'selected':''}>IG</option>
                        <option value="fab fa-whatsapp" ${icon.includes('whatsapp')?'selected':''}>Zap</option>
                        <option value="fas fa-link" ${icon.includes('link')?'selected':''}>Link</option>
                    </select>
                    <input type="text" class="l-label" value="${label}" style="margin:0; flex:1">
                    <span class="badge">${clicks}</span>
                    <button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none;">X</button>
                </div>
                <input type="text" class="l-url" value="${url}" style="margin:0">
            `;
            document.getElementById('links-container').appendChild(div);
        }

        async function loadData(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('p-name').value = d.name || "";
                document.getElementById('p-desc').value = d.desc || "";
                document.getElementById('p-img').value = d.img || "";
                document.getElementById('p-color').value = d.color || "#3b82f6";
                document.getElementById('links-container').innerHTML = "";
                for(let i=0; i < (d.links || []).length; i++) {
                    const cSnap = await getDoc(doc(db, "analytics", `${uid}_link_${i}`));
                    addLinkField(d.links[i].label, d.links[i].url, d.links[i].icon, cSnap.exists() ? cSnap.data().clicks : 0);
                }
            } else { addLinkField(); }
        }

        document.getElementById('save-btn').onclick = async () => {
            const user = auth.currentUser;
            const btn = document.getElementById('save-btn');
            btn.innerText = "Salvando...";
            const links = Array.from(document.querySelectorAll('.link-item')).map(it => ({
                label: it.querySelector('.l-label').value,
                url: it.querySelector('.l-url').value,
                icon: it.querySelector('.l-icon').value
            }));
            try {
                await setDoc(doc(db, "users", user.uid), {
                    name: document.getElementById('p-name').value,
                    desc: document.getElementById('p-desc').value,
                    img: document.getElementById('p-img').value,
                    color: document.getElementById('p-color').value,
                    links: links
                });
                alert("✅ Publicado!");
                location.reload();
            } catch (e) { alert("Erro: " + e.message); }
        };

        document.getElementById('btn-auth').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch { try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); } }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('add-link').onclick = () => addLinkField();
    </script>
</body>
</html>
