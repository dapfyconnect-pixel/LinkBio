<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bio | PowerCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030712; --card: #111827; --border: #1f2937; --primary: #3b82f6; --text: #f9fafb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
        input, select, textarea { width: 100%; background: #030712; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .link-item { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="box">
        <h2>Painel PowerCare</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn btn-primary" id="btn-auth">Entrar</button>
    </div>

    <div id="editor-screen" class="box hidden">
        <header style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3>Editor Premium</h3>
            <button id="btn-logout" style="color:#ff4444; background:none; border:none;">Sair</button>
        </header>

        <label>Foto do Perfil (URL)</label>
        <input type="text" id="p-img">
        
        <label>Nome e Bio</label>
        <input type="text" id="p-name" placeholder="Nome">
        <textarea id="p-desc" rows="2" placeholder="Bio"></textarea>

        <label>Tema de Fundo Animado (PowerCare)</label>
        <select id="p-theme">
            <option value="none">Estático (Apenas cor)</option>
            <option value="stars">✨ Estrelas Cadentes</option>
            <option value="waves">🌊 Ondas Suaves</option>
            <option value="gradient">🌈 Gradiente Animado</option>
            <option value="matrix">📟 Matrix Code</option>
            <option value="bubbles">🧼 Bolhas Flutuantes</option>
            <option value="fire">🔥 Brasa Viva</option>
            <option value="snow">❄️ Neve caindo</option>
            <option value="aurora">🌌 Aurora Boreal</option>
            <option value="digital">💻 Rede Digital</option>
            <option value="particles">⚛️ Partículas Atômicas</option>
        </select>

        <label>Cor de Destaque</label>
        <input type="color" id="p-color" value="#3b82f6" style="height:45px;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
            <span>Links</span>
            <button class="btn" id="add-link" style="width:auto; padding:5px 15px; background:#1f2937; color:white;">+ Adicionar</button>
        </div>
        <div id="links-container"></div>

        <button class="btn btn-primary" id="save-btn">Publicar Alterações</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAvdX5mNJI09c43ZR3QlyKrk6S22DeQ90",
        authDomain: "biolink-211d7.firebaseapp.com",
        projectId: "biolink-211d7",
        storageBucket: "biolink-211d7.firebasestorage.app",
        messagingSenderId: "607886026514",
        appId: "1:607886026514:web:2e803fe882e6d39105b5cb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('editor-screen').classList.remove('hidden');
            loadData(user.uid);
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('editor-screen').classList.add('hidden');
        }
    });

    window.addLinkField = (label = "", url = "", icon = "fas fa-link") => {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerHTML = `
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <select class="l-icon" style="flex:1">
                    <option value="fab fa-instagram" ${icon.includes('instagram')?'selected':''}>Instagram</option>
                    <option value="fab fa-whatsapp" ${icon.includes('whatsapp')?'selected':''}>WhatsApp</option>
                    <option value="fab fa-tiktok" ${icon.includes('tiktok')?'selected':''}>TikTok</option>
                    <option value="fas fa-link" ${icon.includes('link')?'selected':''}>Link</option>
                </select>
                <input type="text" class="l-label" placeholder="Título" value="${label}" style="flex:2; margin:0">
                <button onclick="this.parentElement.parentElement.remove()" style="background:none; border:none; color:red;">X</button>
            </div>
            <input type="text" class="l-url" placeholder="https://..." value="${url}" style="margin:0">
        `;
        document.getElementById('links-container').appendChild(div);
    }

    async function loadData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('p-name').value = d.name || "";
            document.getElementById('p-desc').value = d.desc || "";
            document.getElementById('p-img').value = d.img || "";
            document.getElementById('p-color').value = d.color || "#3b82f6";
            document.getElementById('p-theme').value = d.theme || "none";
            document.getElementById('links-container').innerHTML = "";
            (d.links || []).forEach(l => addLinkField(l.label, l.url, l.icon));
        } else { addLinkField(); }
    }

    document.getElementById('save-btn').onclick = async () => {
        const user = auth.currentUser;
        const btn = document.getElementById('save-btn');
        btn.innerText = "Salvando...";
        
        const links = Array.from(document.querySelectorAll('.link-item')).map(it => ({
            label: it.querySelector('.l-label').value,
            url: it.querySelector('.l-url').value,
            icon: it.querySelector('.l-icon').value
        }));

        await setDoc(doc(db, "users", user.uid), {
            name: document.getElementById('p-name').value,
            desc: document.getElementById('p-desc').value,
            img: document.getElementById('p-img').value,
            color: document.getElementById('p-color').value,
            theme: document.getElementById('p-theme').value,
            links: links
        });
        alert("Publicado!");
        location.reload();
    };

    document.getElementById('btn-auth').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); }
        catch { try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); } }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
    document.getElementById('add-link').onclick = () => addLinkField();
</script>
</body>
</html>
