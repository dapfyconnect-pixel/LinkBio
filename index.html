<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Bio | PowerCare Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #030712; --card: #111827; --border: #1f2937; --primary: #3b82f6; --text: #f9fafb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
        input, select, textarea { width: 100%; background: #030712; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; margin-bottom: 12px; outline: none; }
        label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; display: block; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .url-display { background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 10px; color: #60a5fa; font-size: 0.8rem; border: 1px dashed var(--primary); text-align: center; margin-bottom: 20px; }
        .link-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="box">
        <h2>Acesse sua Bio Pro</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn btn-primary" id="btn-auth">Entrar / Cadastrar</button>
    </div>

    <div id="editor-screen" class="box hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>PowerCare Editor</h3>
            <button id="btn-logout" style="color:#ff4444; background:none; border:none; cursor:pointer;">Sair</button>
        </div>

        <div class="url-display">
            <p style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px;">COPIE ESTE LINK PARA O INSTAGRAM:</p>
            <strong id="final-link">Gerando...</strong>
        </div>

        <label>Foto do Perfil (URL)</label>
        <input type="text" id="p-img" placeholder="https://...">
        
        <label>Nome</label>
        <input type="text" id="p-name">
        
        <label>Bio (Descrição)</label>
        <textarea id="p-desc" rows="2"></textarea>

        <label>Barra de Urgência (Topo)</label>
        <input type="text" id="p-urgency" placeholder="Ex: 🔥 Últimas vagas com 50% OFF!">

        <label>WhatsApp Flutuante (Apenas números com DDD)</label>
        <input type="text" id="p-whatsapp" placeholder="Ex: 5511999999999">

        <label>Cor do Brilho Neon (Aura)</label>
        <input type="color" id="p-color" value="#3b82f6" style="height:45px; cursor:pointer;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
            <span>Links Sociais</span>
            <button class="btn" id="add-link" style="width:auto; padding:5px 15px; background:#1f2937; color:white;">+ Novo</button>
        </div>
        <div id="links-container"></div>

        <button class="btn btn-primary" id="save-btn" style="margin-top:20px;">🚀 Publicar Alterações</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAAvdX5mNJI09c43ZR3QlyKrk6S22DeQ90",
        authDomain: "biolink-211d7.firebaseapp.com",
        projectId: "biolink-211d7",
        storageBucket: "biolink-211d7.firebasestorage.app",
        messagingSenderId: "607886026514",
        appId: "1:607886026514:web:2e803fe882e6d39105b5cb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('editor-screen').classList.remove('hidden');
            // ATENÇÃO: Verifique se o caminho no GitHub Pages está correto (BioPro ou raiz)
            document.getElementById('final-link').innerText = `${window.location.origin}${window.location.pathname.replace('admin.html', 'index.html')}?u=${user.uid}`;
            loadData(user.uid);
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('editor-screen').classList.add('hidden');
        }
    });

    window.addLinkField = (label = "", url = "", icon = "fas fa-link") => {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerHTML = `
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <select class="l-icon" style="flex:1">
                    <option value="fab fa-instagram" ${icon.includes('instagram')?'selected':''}>Instagram</option>
                    <option value="fab fa-whatsapp" ${icon.includes('whatsapp')?'selected':''}>WhatsApp</option>
                    <option value="fab fa-tiktok" ${icon.includes('tiktok')?'selected':''}>TikTok</option>
                    <option value="fab fa-youtube" ${icon.includes('youtube')?'selected':''}>YouTube</option>
                    <option value="fas fa-link" ${icon.includes('link')?'selected':''}>Outro Link</option>
                </select>
                <input type="text" class="l-label" placeholder="Título" value="${label}" style="flex:2; margin:0">
                <button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; font-weight:bold;">X</button>
            </div>
            <input type="text" class="l-url" placeholder="URL (https://...)" value="${url}" style="margin:0">
        `;
        document.getElementById('links-container').appendChild(div);
    }

    async function loadData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('p-name').value = d.name || "";
            document.getElementById('p-desc').value = d.desc || "";
            document.getElementById('p-img').value = d.img || "";
            document.getElementById('p-color').value = d.color || "#3b82f6";
            document.getElementById('p-urgency').value = d.urgency || "";
            document.getElementById('p-whatsapp').value = d.whatsapp || "";
            document.getElementById('links-container').innerHTML = "";
            (d.links || []).forEach(l => addLinkField(l.label, l.url, l.icon));
        } else { addLinkField(); }
    }

    document.getElementById('save-btn').onclick = async () => {
        const user = auth.currentUser;
        const btn = document.getElementById('save-btn');
        btn.innerText = "⏳ Publicando...";
        const links = Array.from(document.querySelectorAll('.link-item')).map(it => ({
            label: it.querySelector('.l-label').value,
            url: it.querySelector('.l-url').value,
            icon: it.querySelector('.l-icon').value
        }));
        try {
            await setDoc(doc(db, "users", user.uid), {
                name: document.getElementById('p-name').value,
                desc: document.getElementById('p-desc').value,
                img: document.getElementById('p-img').value,
                color: document.getElementById('p-color').value,
                urgency: document.getElementById('p-urgency').value,
                whatsapp: document.getElementById('p-whatsapp').value,
                links: links
            });
            alert("✅ Bio atualizada com sucesso!");
            location.reload();
        } catch(e) { alert("Erro ao salvar: " + e.message); }
    };

    document.getElementById('btn-auth').onclick = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); }
        catch { try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { alert(e.message); } }
    };
    document.getElementById('btn-logout').onclick = () => signOut(auth);
    document.getElementById('add-link').onclick = () => addLinkField();
</script>
</body>
</html>
